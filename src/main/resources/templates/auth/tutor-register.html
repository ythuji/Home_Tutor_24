<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Registration - HomeTutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background:
                    radial-gradient(circle at 10% 8%, #dbeafe 0, transparent 35%),
                    radial-gradient(circle at 92% 2%, #bfdbfe 0, transparent 33%),
                    linear-gradient(180deg, #f8fbff 0%, #eef6ff 55%, #ffffff 100%);
            min-height: 100vh;
            color: #1e293b;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.82);
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 18px 45px rgba(37, 99, 235, 0.12);
        }
        .input-field {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            background: #f8fbff;
            transition: border-color 0.25s, box-shadow 0.25s, background-color 0.25s;
        }
        .input-field:focus {
            outline: none;
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            background: #1d4ed8;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
        }
        .link-text {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .link-text:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<!-- Navigation Header -->
<nav style="background: rgba(255,255,255,0.86); border-bottom: 1px solid #dbeafe; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 32px; height: 32px; background: #2563eb; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px;">S</div>
        <a href="/" style="font-weight: bold; font-size: 18px; color: #1d4ed8; text-decoration: none;">TutorSync</a>
    </div>
    <a href="/" style="font-size: 13px; font-weight: bold; color: #64748b; text-decoration: none; text-transform: uppercase;">← Back to Home</a>
</nav>

<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="form-container w-full max-w-md">
        <div class="p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="text-4xl font-bold text-blue-700 mb-2">
                    <i class="fas fa-chalkboard-user"></i> HomeTutor
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">Become a Tutor</h1>
                <p class="text-gray-600">Share your knowledge and earn money</p>
            </div>

            <!-- Error Message -->
            <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Success Message -->
            <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-6 flex items-center">
                <i class="fas fa-check-circle mr-2"></i>
                <span th:text="${success}"></span>
            </div>

            <!-- Form -->
            <form method="post" th:action="@{/tutors/register}">
                <!-- Full Name -->
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-user text-blue-600 mr-2"></i>Full Name
                    </label>
                    <input type="text" name="name" required class="input-field w-full" placeholder="Enter your full name">
                </div>

                <!-- Email -->
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-envelope text-blue-600 mr-2"></i>Email Address
                    </label>
                    <input type="email" name="email" required class="input-field w-full" placeholder="your.email@example.com">
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-lock text-blue-600 mr-2"></i>Password
                    </label>
                    <input type="password" name="password" required class="input-field w-full" placeholder="Create a strong password">
                </div>

                <!-- Phone -->
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-phone text-blue-600 mr-2"></i>Phone Number
                    </label>
                    <input type="tel" name="phone" required class="input-field w-full" placeholder="Enter your phone number">
                </div>

                <!-- Specialization -->
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-book text-blue-600 mr-2"></i>Specialization
                    </label>
                    <select name="specialization" required class="input-field w-full">
                        <option value="">Select a subject</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="ICT">ICT</option>
                        <option value="English">English</option>
                        <option value="History">History</option>
                    </select>
                </div>

                <!-- Hourly Rate -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-dollar-sign text-blue-600 mr-2"></i>Hourly Rate ($)
                    </label>
                    <input type="number" name="hourlyRate" step="0.01" required class="input-field w-full" placeholder="e.g., 45.00">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary w-full mb-4 flex items-center justify-center">
                    <i class="fas fa-user-plus mr-2"></i>Register as Tutor
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-gray-300"></div>
                <span class="px-3 text-gray-500 text-sm">or</span>
                <div class="flex-1 border-t border-gray-300"></div>
            </div>

            <!-- Links -->
            <div class="text-center space-y-2">
                <p class="text-gray-600">Already have an account?
                    <a th:href="@{/login}" class="link-text"><i class="fas fa-sign-in-alt mr-1"></i>Login here</a>
                </p>
                <p class="text-gray-600">Student?
                    <a th:href="@{/users/register}" class="link-text"><i class="fas fa-user-graduate mr-1"></i>Register as Student</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
