<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tutor List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 30px; }
        h2 { color: #2c3e50; font-weight: 600; margin-bottom: 20px; }
        thead { background-color: #2c3e50; color: white; }
        .table { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-bar { max-width: 400px; margin-bottom: 20px; }
        .badge-full { background-color: #2c3e50; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
        .badge-part { background-color: #7f8c8d; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 mb-12">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-[4px]"></div>
        <span class="font-bold text-xl tracking-tight">TutorSync Registry</span>
    </div>
    <div class="flex items-center gap-6">
        <a th:href="@{/dashboard}" class="text-[13px] font-medium text-gray-500 hover:text-blue-600">DASHBOARD</a>
        <a th:if="${session.loggedUser != null && session.loggedUser.role == 'TUTOR'}"
           th:href="@{/tutors/add}" class="px-4 py-2 bg-blue-600 text-white text-[11px] font-bold rounded-[4px] uppercase tracking-widest">Register New Node</a>
        <a th:href="@{/logout}" class="text-[13px] font-bold text-red-500 uppercase">LOGOUT</a>
    </div>
</header>

<div class="top-bar">
    <h2>Tutor Management</h2>
    <a href="/tutors/add" class="btn btn-success">+ Add New Tutor</a>
</div>

<!-- Search bar -->
<form action="/tutors/search" method="get" class="d-flex search-bar gap-2">
    <input type="text" name="id" class="form-control" placeholder="Search by Tutor ID">
    <button type="submit" class="btn btn-primary">Search</button>
</form>

<!-- Search result -->
<div th:if="${tutor}" class="alert alert-info mb-3">
    <strong>Search Result:</strong>
    <span th:text="${tutor.getDetails()}"></span>
</div>

<!-- No result message -->
<div th:if="${tutor == null and param.id != null}" class="alert alert-warning mb-3">
    No tutor found with that ID.
</div>

<!-- Tutor table -->
<table class="table table-hover">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Experience</th>
        <th>Availability</th>
        <th>Rate (Rs.)</th>
        <th>Type</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${tutors}">
        <td th:text="${t.tutorId}"></td>
        <td th:text="${t.name}"></td>
        <td th:text="${t.email}"></td>
        <td th:text="${t.subject}"></td>
        <td th:text="${t.experienceYears} + ' yrs'"></td>
        <td th:text="${t.availability}"></td>
        <td th:text="'Rs.' + ${t.hourlyRate}"></td>
        <td>
            <span th:if="${t.tutorType == 'fulltime'}" class="badge-full">Full Time</span>
            <span th:if="${t.tutorType == 'parttime'}" class="badge-part">Part Time</span>
        </td>
        <td>
            <a th:href="@{/tutors/edit/{id}(id=${t.tutorId})}"
               class="btn btn-warning btn-sm">Edit</a>
            <a th:href="@{/tutors/delete/{id}(id=${t.tutorId})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure you want to delete this tutor?')">Delete</a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(tutors)}">
        <td colspan="9" class="text-center text-muted py-3">No tutors found. Click Add New Tutor to get started.</td>
    </tr>
    </tbody>
</table>

</body>
</html>
