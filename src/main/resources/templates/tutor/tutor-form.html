<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tutor Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .form-title { color: #2c3e50; margin-bottom: 24px; font-weight: 600; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
    </style>
</head>
<body>
<div class="form-card">

    <!-- Title changes based on add or edit -->
    <h2 class="form-title" th:text="${action == 'edit'} ? 'Edit Tutor' : 'Add New Tutor'"></h2>

    <!-- Form action changes based on add or edit -->
    <form th:action="${action == 'edit'} ? @{/tutors/edit/{id}(id=${tutor.tutorId})} : @{/tutors/add}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Tutor ID</label>
            <input type="text" name="tutorId" class="form-control"
                   th:value="${tutor.tutorId}"
                   th:readonly="${action == 'edit'}"
                   placeholder="e.g. T001" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control"
                   th:value="${tutor.name}"
                   placeholder="Enter full name" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control"
                   th:value="${tutor.email}"
                   placeholder="Enter email" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control"
                   th:value="${tutor.phone}"
                   placeholder="Enter phone number" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control"
                   th:value="${tutor.subject}"
                   placeholder="e.g. Mathematics" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Experience (years)</label>
            <input type="number" name="experienceYears" class="form-control"
                   th:value="${tutor.experienceYears}"
                   min="0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Availability</label>
            <select name="availability" class="form-control">
                <option value="Morning"
                        th:selected="${tutor.availability == 'Morning'}">Morning</option>
                <option value="Evening"
                        th:selected="${tutor.availability == 'Evening'}">Evening</option>
                <option value="Weekend"
                        th:selected="${tutor.availability == 'Weekend'}">Weekend</option>
                <option value="Flexible"
                        th:selected="${tutor.availability == 'Flexible'}">Flexible</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Hourly Rate (Rs.)</label>
            <input type="number" name="hourlyRate" class="form-control"
                   th:value="${tutor.hourlyRate}"
                   min="0" step="0.01" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Tutor Type</label>
            <select name="tutorType" class="form-control">
                <option value="fulltime"
                        th:selected="${tutor.tutorType == 'fulltime'}">Full Time</option>
                <option value="parttime"
                        th:selected="${tutor.tutorType == 'parttime'}">Part Time</option>
            </select>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"
                    th:text="${action == 'edit'} ? 'Update Tutor' : 'Add Tutor'"></button>
            <a href="/tutors" class="btn btn-secondary px-4">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
