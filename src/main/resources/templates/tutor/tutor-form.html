<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tutor Form - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 40px; }
        .input-field { width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #2563eb; }
        .btn-primary { background: #2563eb; color: white; padding: 12px; border-radius: 4px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<!-- Navigation Header -->
<header class="bg-white border-b border-gray-200 py-4 px-10 sticky top-0 z-50">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
            <a th:href="@{/dashboard}" class="font-bold text-lg text-blue-600 hover:opacity-80">TutorSync</a>
        </div>
        <div class="flex gap-6 items-center">
            <a th:href="@{/tutors/list}" class="text-[13px] font-bold text-gray-600 uppercase hover:text-blue-600">Tutors</a>
            <a th:href="@{/dashboard}" class="text-[13px] font-bold text-blue-600 uppercase hover:opacity-80">← Back to Dashboard</a>
        </div>
    </div>
</header>

<div class="flex items-center justify-center py-6">
    <div class="max-w-md w-full px-6">
        <div class="panel shadow-sm">
            <h2 class="text-xl font-bold uppercase tracking-widest text-center mb-10" th:text="${tutor == null ? 'Initialize Tutor Node' : 'Update Node Config'}">Node Operation</h2>

            <form th:action="@{/tutors/save}" method="POST" class="space-y-6">
                <!-- Hidden ID for updates -->
                <input type="hidden" name="id" th:value="${tutor?.id}">

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Master Identity</label>
                    <input type="text" name="name" th:value="${tutor?.name}" placeholder="FULL NAME" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Email Access Path</label>
                    <input type="email" name="email" th:value="${tutor?.email}" placeholder="EMAIL ADDRESS" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Specialization Domain</label>
                    <input type="text" name="specialization" th:value="${tutor?.specialization}" placeholder="e.g. DATA STRUCTURES" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Pricing Structure (USD/HR)</label>
                    <input type="number" name="rate" th:value="${tutor?.hourlyRate}" placeholder="0.00" step="0.01" required class="input-field">
                </div>

                <button type="submit" class="w-full btn-primary" th:text="${tutor == null ? 'Commit to Registry' : 'Update Registry Record'}">Execute Command</button>
            </form>

            <div class="mt-8 text-center border-t border-gray-100 pt-6">
                <a th:href="@{/tutors/list}" class="text-[11px] font-bold text-gray-400 uppercase tracking-widest hover:text-blue-600">Abort Operation & Return</a>
            </div>
        </div>
    </div>
</body>
</html>
