<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registry List - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 24px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .panel-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
        th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; padding: 12px 16px; border-bottom: 2px solid #f1f5f9; }
        td { padding: 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 mb-12">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-[4px]"></div>
        <span class="font-bold text-xl tracking-tight">TutorSync Registry</span>
    </div>
    <div class="flex items-center gap-6">
        <a th:href="@{/dashboard}" class="text-[13px] font-medium text-gray-500 hover:text-blue-600 transition-colors">DASHBOARD</a>
        <a th:href="@{/logout}" class="text-[13px] font-bold text-red-500 uppercase">LOGOUT</a>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6">
    <div class="panel shadow-sm mb-12">
        <h2 class="panel-title">Active Node Map</h2>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                <tr>
                    <th>Identity ID</th>
                    <th>Master Name</th>
                    <th>Access Path</th>
                    <th>Core Role</th>
                    <th>Attributes</th>
                    <th>Operation</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}" class="hover:bg-slate-50 transition-colors">
                    <td class="font-mono text-gray-400" th:text="${user.id}"></td>
                    <td class="font-bold" th:text="${user.name}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                                <span th:class="${user.role == 'STUDENT' ? 'bg-blue-50 text-blue-600' : 'bg-purple-50 text-purple-600'} + ' px-2 py-1 rounded text-[10px] font-bold tracking-widest uppercase'"
                                      th:text="${user.role}"></span>
                    </td>
                    <td class="text-gray-500 italic">
                        <span th:if="${user.role == 'STUDENT'}" th:text="'Grade: ' + ${user.grade}"></span>
                        <span th:if="${user.role == 'TUTOR'}" th:text="${user.specialization} + ' @ $' + ${user.hourlyRate}"></span>
                    </td>
                    <td>
                        <a th:href="@{'/users/delete/' + ${user.id}}"
                           class="text-red-400 hover:text-red-600 font-bold text-[10px] uppercase tracking-widest"
                           onclick="return confirm('Terminate this node?')">Terminate</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
