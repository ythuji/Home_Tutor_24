<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 40px; }
        .input-field { width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #2563eb; }
        .btn-primary { background: #2563eb; color: white; padding: 12px; border-radius: 4px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.9; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<!-- Navigation Header -->
<header class="bg-white border-b border-gray-200 py-4 px-10 sticky top-0 z-50">
    <div class="max-w-full flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
            <a th:href="@{/}" class="font-bold text-lg text-blue-600 hover:opacity-80">TutorSync</a>
        </div>
        <a th:href="@{/}" class="text-[13px] font-bold text-gray-600 uppercase hover:text-blue-600">← Back to Home</a>
    </div>
</header>

<div class="flex items-center justify-center min-h-[calc(100vh-80px)] py-6">
    <div class="max-w-md w-full px-6">
        <div class="panel shadow-sm">
            <h2 class="text-xl font-bold uppercase tracking-widest text-center mb-8">System Registry</h2>

            <form th:action="@{/users/register}" method="POST" class="space-y-6">
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Master Identity</label>
                    <input type="text" name="name" placeholder="FULL NAME" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Email Access Path</label>
                    <input type="email" name="email" placeholder="EMAIL ADDRESS" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Secure Key</label>
                    <input type="password" name="password" placeholder="PASSWORD" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Role Allocation</label>
                    <select name="role" id="roleSelect" class="input-field" onchange="toggleFields()">
                        <option value="STUDENT">STUDENT MODULE</option>
                        <option value="TUTOR">TUTOR MODULE</option>
                    </select>
                </div>

                <!-- Role specific fields -->
                <div id="studentFields" class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Grade Level</label>
                    <input type="text" name="grade" placeholder="e.g. YEAR 10" class="input-field">
                </div>

                <div id="tutorFields" class="hidden space-y-4">
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Specialization Domain</label>
                        <input type="text" name="subject" placeholder="e.g. QUANTUM PHYSICS" class="input-field">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Hourly Rate (USD)</label>
                        <input type="number" name="rate" placeholder="0.00" step="0.01" class="input-field">
                    </div>
                </div>

                <button type="submit" class="w-full btn-primary">Initialize Account</button>
            </form>

            <div class="mt-8 text-center border-t border-gray-100 pt-6 space-y-3">
                <div>
                    <a th:href="@{/login}" class="text-[11px] font-bold text-blue-600 uppercase tracking-widest hover:opacity-80">Existing User Path? Sign In</a>
                </div>
                <div class="text-[11px] text-gray-400">─── or ───</div>
                <div>
                    <a th:href="@{/tutors/register}" class="text-[11px] font-bold text-green-600 uppercase tracking-widest hover:opacity-80">Register as Tutor →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleFields() {
            const role = document.getElementById('roleSelect').value;
            const studentFields = document.getElementById('studentFields');
            const tutorFields = document.getElementById('tutorFields');

            if (role === 'STUDENT') {
                studentFields.classList.remove('hidden');
                tutorFields.classList.add('hidden');
            } else {
                studentFields.classList.add('hidden');
                tutorFields.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
