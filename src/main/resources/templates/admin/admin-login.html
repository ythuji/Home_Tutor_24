<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background:
                    radial-gradient(circle at 8% 10%, #dbeafe 0, transparent 35%),
                    radial-gradient(circle at 92% 0%, #bfdbfe 0, transparent 34%),
                    linear-gradient(180deg, #f8fbff 0%, #eef6ff 55%, #ffffff 100%);
            color: #1e293b;
            min-height: 100vh;
        }
        .login-panel {
            background: rgba(255, 255, 255, 0.82);
            border-radius: 18px;
            padding: 40px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 18px 45px rgba(37, 99, 235, 0.12);
        }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: #f8fbff;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.25s;
        }
        .input-field:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background: #ffffff;
        }
        .btn-login {
            background: #2563eb;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            width: 100%;
            transition: all 0.25s;
            border: none;
            cursor: pointer;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            background: #1d4ed8;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
        }
        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .admin-badge {
            display: inline-block;
            background: #eff6ff;
            color: #1d4ed8;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid #bfdbfe;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
<!-- Navigation Header -->
<header class="bg-white/85 border-b border-blue-100 py-4 px-6 md:px-10 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-full flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
            <a th:href="@{/}" class="font-bold text-lg text-blue-700 hover:opacity-80">TutorSync</a>
        </div>
        <a th:href="@{/}" class="text-[12px] font-bold text-slate-500 uppercase tracking-wide hover:text-blue-700">← Back to Home</a>
    </div>
</header>

<div class="flex items-center justify-center min-h-[calc(100vh-80px)] py-6">
    <div class="w-full max-w-md px-6">
        <!-- Admin Badge -->
        <div class="text-center mb-8">
            <div class="admin-badge">🛡️ ADMIN PORTAL</div>
            <h1 class="text-3xl font-bold text-slate-900 mt-4 mb-2">TutorSync Admin</h1>
            <p class="text-slate-600 text-sm">Secure access for authorized administrators</p>
        </div>

        <div class="login-panel">
            <!-- Error Message -->
            <div th:if="${error}" class="error-message" th:text="${error}"></div>

            <form th:action="@{/admin/login}" method="POST" class="space-y-5">
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Admin Email</label>
                    <input type="email" name="email" placeholder="admin@tutorsync.com" required class="input-field">
                </div>

                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest block mb-2">Password</label>
                    <input type="password" name="password" placeholder="Enter admin password" required class="input-field">
                </div>

                <button type="submit" class="btn-login mt-6">Sign In to Dashboard</button>
            </form>

            <!-- Info Box -->
            <div class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-xl">
                <p class="text-[11px] text-blue-700 leading-relaxed">
                    <span class="font-bold block uppercase mb-1">🔐 Demo Credentials</span>
                    Email: admin@tutorsync.com<br>
                    Password: admin123
                </p>
            </div>

            <!-- Footer Link -->
            <div class="mt-8 text-center border-t border-blue-100 pt-6">
                <a th:href="@{/}" class="text-[11px] font-bold text-blue-600 uppercase tracking-widest hover:opacity-70">← Back to Home</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
