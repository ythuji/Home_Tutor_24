<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Payments - TutorSync Admin</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
        .nav-sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; height: calc(100vh - 80px); padding: 32px; flex-shrink: 0; overflow-y: auto; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 0; font-size: 13px; font-weight: 500; color: #64748b; transition: all 0.2s; }
        .sidebar-link:hover { color: #2563eb; font-weight: 600; }
        .btn-danger { background: #dc2626; color: white; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 700; text-decoration: none; }
        .status-paid { background: #dcfce7; color: #15803d; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #b45309; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .status-refunded { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .table-row { border-bottom: 1px solid #e2e8f0; padding: 16px 0; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
        <span class="font-bold text-xl tracking-tight">TutorSync <span class="text-blue-600">Admin</span></span>
    </div>
    <a th:href="@{/admin/logout}" class="text-[13px] font-bold text-red-500 uppercase hover:underline">Logout</a>
</header>

<div class="flex">
    <aside class="nav-sidebar">
        <h3 class="text-[10px] uppercase font-bold text-gray-400 tracking-[0.2em] mb-8">Administration</h3>
        <nav class="space-y-2">
            <a th:href="@{/admin/dashboard}" class="sidebar-link">📊 Dashboard</a>
            <a th:href="@{/admin/users}" class="sidebar-link">👥 Users</a>
            <a th:href="@{/admin/tutors}" class="sidebar-link">🎓 Tutors</a>
            <a th:href="@{/admin/bookings}" class="sidebar-link">📅 Bookings</a>
            <a th:href="@{/admin/payments}" class="sidebar-link text-blue-600 font-bold">💰 Payments</a>
            <a th:href="@{/admin/reviews}" class="sidebar-link">⭐ Reviews</a>
            <a th:href="@{/admin/admins}" class="sidebar-link">🛡️ Admins</a>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <h1 class="text-3xl font-bold text-gray-900 mb-8 uppercase">💰 Payment Management</h1>

        <div class="panel">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                    <tr class="border-b-2 border-gray-200">
                        <th class="text-left py-3 px-4 font-bold text-gray-700 uppercase text-xs">Payment ID</th>
                        <th class="text-left py-3 px-4 font-bold text-gray-700 uppercase text-xs">Booking</th>
                        <th class="text-left py-3 px-4 font-bold text-gray-700 uppercase text-xs">Amount</th>
                        <th class="text-left py-3 px-4 font-bold text-gray-700 uppercase text-xs">Method</th>
                        <th class="text-left py-3 px-4 font-bold text-gray-700 uppercase text-xs">Status</th>
                        <th class="text-center py-3 px-4 font-bold text-gray-700 uppercase text-xs">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="payment : ${payments}" class="table-row hover:bg-gray-50">
                        <td class="py-3 px-4 text-gray-900 font-bold" th:text="${payment.id}">P001</td>
                        <td class="py-3 px-4 text-gray-700" th:text="${payment.bookingId}">B001</td>
                        <td class="py-3 px-4 text-gray-900 font-bold" th:text="${'$' + payment.amount}">$45.00</td>
                        <td class="py-3 px-4 text-gray-700">Card</td>
                        <td class="py-3 px-4">
                            <span th:class="${'status-' + payment.status.toLowerCase()}" th:text="${payment.status}">PAID</span>
                        </td>
                        <td class="py-3 px-4 text-center">
                            <a th:href="@{/admin/delete-payment/{id}(id=${payment.id})}" class="btn-danger" onclick="return confirm('Delete this payment?')">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
