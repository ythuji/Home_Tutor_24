<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Review Registry - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 24px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .panel-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
        .review-card { background: white; border: 1px solid #e2e8f0; border-radius: 4px; padding: 20px; margin-bottom: 12px; }
        .star { color: #2563eb; font-weight: 800; font-size: 14px; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 mb-12">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-[4px]"></div>
        <span class="font-bold text-xl tracking-tight">TutorSync Reviews</span>
    </div>
    <div class="flex items-center gap-6">
        <a th:href="@{/dashboard}" class="text-[13px] font-medium text-gray-500 hover:text-blue-600">DASHBOARD</a>
        <a th:href="@{/logout}" class="text-[13px] font-bold text-red-500 uppercase">LOGOUT</a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-6">
    <div class="panel shadow-sm">
        <h2 class="panel-title">Quality Assurance Logs</h2>

        <div th:if="${#lists.isEmpty(reviews)}" class="py-12 text-center text-gray-400 font-bold uppercase tracking-widest text-[10px]">
            No review records found in registry.
        </div>

        <div class="space-y-4">
            <div th:each="review : ${reviews}" class="review-card shadow-sm">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest block mb-1">Expert Identifier</span>
                        <span class="font-bold text-gray-900" th:text="${review.tutorId}">TUTOR_ID</span>
                    </div>
                    <div class="flex gap-1">
                        <span th:each="i : ${#numbers.sequence(1, review.rating)}" class="star">★</span>
                    </div>
                </div>
                <p class="text-[13px] text-gray-600 leading-relaxed italic" th:text="'&quot;' + ${review.comment} + '&quot;'">COMMENT</p>
                <div class="mt-4 pt-4 border-t border-gray-50 flex justify-between">
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest" th:text="'Subject Entity: ' + ${review.studentId}">STUDENT</span>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
