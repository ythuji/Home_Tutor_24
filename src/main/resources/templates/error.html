<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error - Page Not Found</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center min-h-screen px-4">
    <div class="text-center">
        <div class="mb-8">
            <h1 class="text-6xl font-bold text-indigo-600 mb-4">404</h1>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Page Not Found</h2>
            <p class="text-gray-600 text-lg mb-8">Sorry, the page you're looking for doesn't exist or there was an error accessing it.</p>
        </div>
        <div class="space-x-4">
            <a href="/" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition inline-block">Go Home</a>
            <a href="/dashboard" class="px-8 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition inline-block">Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
