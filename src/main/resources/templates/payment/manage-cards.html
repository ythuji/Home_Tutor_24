<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Payment Cards - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px; text-align: center; }
        .header h1 { font-size: 24px; font-weight: bold; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .card-item { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .card-info { flex: 1; }
        .card-name { font-weight: 600; font-size: 16px; color: #1e293b; }
        .card-details { font-size: 14px; color: #64748b; margin-top: 4px; }
        .card-actions { display: flex; gap: 12px; }
        .btn-edit { background: #667eea; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-edit:hover { background: #5568d3; }
        .btn-delete { background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-delete:hover { background: #dc2626; }
        .btn-add { background: #667eea; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-bottom: 24px; display: inline-block; }
        .btn-add:hover { background: #5568d3; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state i { font-size: 48px; color: #cbd5e1; margin-bottom: 16px; display: block; }
        .empty-state p { color: #64748b; font-size: 16px; margin-bottom: 24px; }
        .back-link { color: #667eea; text-decoration: none; font-weight: 600; margin-bottom: 20px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="header">
    <h1><i class="fas fa-credit-card mr-2"></i> My Payment Cards</h1>
</div>

<div class="container">
    <a th:href="@{/payments/history}" class="back-link">
        <i class="fas fa-arrow-left mr-1"></i> Back to Payments
    </a>

    <a th:href="@{/payments/cards/add}" class="btn-add">
        <i class="fas fa-plus mr-2"></i> Add New Card
    </a>

    <div th:if="${#lists.isEmpty(cards)}">
        <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>No saved cards yet</p>
            <a th:href="@{/payments/cards/add}" class="btn-add">
                <i class="fas fa-plus mr-2"></i> Add Your First Card
            </a>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(cards)}">
        <div th:each="card : ${cards}" class="card-item">
            <div class="card-info">
                <div class="card-name" th:text="${card.cardholderName}"></div>
                <div class="card-details">
                    <span th:text="${card.cardNumber}"></span> | Expires: <span th:text="${card.expiryDate}"></span>
                </div>
            </div>
            <div class="card-actions">
                <a th:href="@{'/payments/cards/edit/' + ${card.id}}" class="btn-edit">
                    <i class="fas fa-edit mr-1"></i> Edit
                </a>
                <a th:href="@{'/payments/cards/delete/' + ${card.id}}" class="btn-delete" onclick="return confirm('Delete this card?');">
                    <i class="fas fa-trash mr-1"></i> Delete
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
