<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Processing - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .panel { background: #ffffff; border-radius: 12px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .input-field { width: 100%; padding: 12px 16px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input-field:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn-primary { background: #667eea; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; width: 100%; border: none; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #e2e8f0; color: #334155; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; display: inline-block; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-secondary:hover { background: #cbd5e1; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .section-title { font-size: 14px; font-weight: 600; color: #1e293b; margin-top: 24px; margin-bottom: 12px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .card-option { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .card-option input[type="radio"] { margin-right: 12px; cursor: pointer; }
        .card-option:hover { border-color: #667eea; background: #f1f5ff; }
        .card-option.selected { border-color: #667eea; background: #f1f5ff; }
        .card-name { font-weight: 600; color: #1e293b; }
        .card-details { font-size: 12px; color: #64748b; margin-top: 4px; }
        .hidden-element { display: none; }
        .visible { display: block; }
        .text-center { text-align: center; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<!-- Navigation Header -->
<header class="bg-white border-b border-gray-200 py-4 px-10 sticky top-0 z-50">
    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">S</div>
            <a th:href="@{/dashboard}" class="font-bold text-lg text-blue-600 hover:opacity-80">TutorSync</a>
        </div>
        <div class="flex gap-6 items-center">
            <a th:href="@{/bookings/list}" class="text-[13px] font-bold text-gray-600 uppercase hover:text-blue-600">My Bookings</a>
            <a th:href="@{/payments/history}" class="text-[13px] font-bold text-blue-600 uppercase hover:opacity-80">← Back to Payments</a>
        </div>
    </div>
</header>

<div class="flex items-center justify-center min-h-[calc(100vh-80px)] py-8">
    <div class="max-w-md w-full px-6">
        <div class="panel">
            <div class="text-center mb-8">
                <i class="fas fa-credit-card text-3xl text-blue-600 mb-2"></i>
                <h2 class="text-2xl font-bold">Payment Processing</h2>
            </div>

            <form th:action="@{/payments/process}" method="POST" class="space-y-6" onchange="updateForm()">
                <div class="space-y-1">
                    <label class="label">Booking Reference</label>
                    <input type="text" name="bookingId" th:value="${bookingId}" placeholder="B001" required class="input-field" readonly>
                </div>

                <div class="space-y-1">
                    <label class="label">Student ID</label>
                    <input type="text" name="studentId" th:value="${studentId}" placeholder="U001" required class="input-field" readonly>
                </div>

                <div th:if="${booking != null}" class="bg-blue-50 border border-blue-200 rounded-8 p-3">
                    <div class="text-sm text-blue-900">
                        <strong>Booking ID:</strong> <span th:text="${booking.id}"></span><br>
                        <strong>Subject:</strong> <span th:text="${booking.subject}"></span><br>
                        <strong>Date:</strong> <span th:text="${booking.dateTime}"></span>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="label">Amount (USD)</label>
                    <input type="number" name="amount" placeholder="45.00" step="0.01" required class="input-field">
                </div>

                <div class="space-y-1">
                    <label class="label">Payment Method</label>
                    <select name="paymentMethod" id="paymentMethod" required class="input-field">
                        <option value="">SELECT METHOD...</option>
                        <option value="CARD">Credit Card</option>
                        <option value="ONLINE">Online Payment</option>
                        <option value="CASH">Cash</option>
                    </select>
                </div>

                <div id="cardSection" class="hidden-element">
                    <div class="section-title">
                        <i class="fas fa-wallet mr-2"></i> Select Payment Card
                    </div>

                    <div th:if="${#lists.isEmpty(userCards)}">
                        <p class="text-sm text-gray-600 mb-4">No saved cards. <a th:href="@{/payments/cards/add}" class="text-blue-600 font-semibold">Add a card</a></p>
                    </div>

                    <div th:if="${!#lists.isEmpty(userCards)}">
                        <div th:each="card : ${userCards}" class="card-option" onclick="selectCard(this)">
                            <label style="display: flex; align-items: center; cursor: pointer;">
                                <input type="radio" name="cardId" th:value="${card.id}" class="cursor-pointer">
                                <div style="flex: 1;">
                                    <div class="card-name" th:text="${card.cardholderName}"></div>
                                    <div class="card-details"><span th:text="${card.cardNumber}"></span> | Expires: <span th:text="${card.expiryDate}"></span></div>
                                </div>
                            </label>
                        </div>
                        <a th:href="@{/payments/cards/add}" class="btn-secondary btn-block">
                            <i class="fas fa-plus mr-1"></i> Add New Card
                        </a>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-check mr-2"></i> Process Payment
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-100 pt-6">
                <a th:href="@{/payments/history}" class="text-sm font-semibold text-blue-600 hover:text-blue-700">
                    <i class="fas fa-arrow-left mr-1"></i> View Payment History
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateForm() {
            const method = document.getElementById('paymentMethod').value;
            const cardSection = document.getElementById('cardSection');
            if (method === 'CARD') {
                cardSection.classList.remove('hidden-element');
                cardSection.classList.add('visible');
            } else {
                cardSection.classList.add('hidden-element');
                cardSection.classList.remove('visible');
            }
        }

        function selectCard(element) {
            document.querySelectorAll('.card-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }
    </script>
</body>
</html>
