<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking Registry - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .panel { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 24px; }
        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 24px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .panel-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
        .booking-row { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; padding: 16px 24px; margin-bottom: 12px; border-radius: 4px; transition: border-color 0.2s; }
        .booking-row:hover { border-color: #2563eb; }
        .status-badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.1em; }
        .status-pending { background: #fffbeb; color: #d97706; border: 1px solid #fef3c7; }
        .status-accepted { background: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7; }
        .status-completed { background: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; }
        .btn-action { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 6px 12px; border-radius: 4px; border: 1px solid transparent; transition: all 0.2s; }
    </style>
</head>
<body class="bg-[#f8fafc]">
<header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-10 mb-12">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-[4px]"></div>
        <span class="font-bold text-xl tracking-tight">TutorSync Ops</span>
    </div>
    <div class="flex items-center gap-6">
        <a th:href="@{/dashboard}" class="text-[13px] font-medium text-gray-500 hover:text-blue-600">DASHBOARD</a>
        <a th:href="@{/logout}" class="text-[13px] font-bold text-red-500 uppercase">LOGOUT</a>
    </div>
</header>

<main class="max-w-5xl mx-auto px-6">
    <div class="panel shadow-sm">
        <div class="flex justify-between items-end mb-8">
            <h2 class="panel-title flex-1">Transaction Instance Map</h2>
            <a th:if="${session.loggedUser.role == 'STUDENT'}" th:href="@{/bookings/create}"
               class="px-5 py-2.5 bg-blue-600 text-white text-[11px] font-bold rounded-md uppercase tracking-widest hover:opacity-90">Schedule Logic Unit</a>
        </div>

        <div th:if="${#lists.isEmpty(bookings)}" class="py-20 text-center border-2 border-dashed border-gray-100 rounded-xl">
            <p class="text-gray-400 font-bold uppercase tracking-widest text-[11px]">Buffer Empty. No scheduled transactions.</p>
        </div>

        <div class="space-y-2">
            <div th:each="booking : ${bookings}" class="booking-row shadow-sm">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-1">
                        <span class="font-bold text-gray-900" th:text="${booking.subject}">DOMAIN</span>
                        <span th:class="'status-badge ' + ${'status-' + booking.status.toLowerCase()}" th:text="${booking.status}">STATUS</span>
                    </div>
                    <div class="text-[11px] text-gray-400 font-medium flex items-center gap-2">
                        <span th:text="${booking.dateTime}">DATE TIME</span>
                        <span class="w-1 h-1 bg-gray-200 rounded-full"></span>
                        <span th:text="'Ref ID: ' + ${booking.id}">ID</span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Tutor Controls -->
                    <div th:if="${session.loggedUser.role == 'TUTOR'}" class="flex gap-2">
                        <th:block th:if="${booking.status == 'PENDING'}">
                            <a th:href="@{'/bookings/status/' + ${booking.id} + '/ACCEPTED'}" class="btn-action bg-green-600 text-white">Accept</a>
                            <a th:href="@{'/bookings/status/' + ${booking.id} + '/CANCELLED'}" class="btn-action bg-gray-100 text-gray-500">Cancel</a>
                        </th:block>
                        <th:block th:if="${booking.status == 'ACCEPTED'}">
                            <a th:href="@{'/bookings/status/' + ${booking.id} + '/COMPLETED'}" class="btn-action bg-purple-600 text-white">Mark Complete</a>
                        </th:block>
                    </div>

                    <!-- Student Controls -->
                    <div th:if="${session.loggedUser.role == 'STUDENT'}" class="flex gap-2 items-center">
                        <!-- Edit Button: Only for PENDING bookings -->
                        <th:block th:if="${booking.status == 'PENDING'}">
                            <a th:href="@{'/bookings/edit/' + ${booking.id}}" class="btn-action bg-blue-600 text-white hover:opacity-90">
                                <i class="fas fa-edit mr-1"></i> EDIT
                            </a>
                        </th:block>

                        <!-- Make Payment Button: Only for ACCEPTED bookings -->
                        <th:block th:if="${booking.status == 'ACCEPTED'}">
                            <a th:href="@{'/payments/create?bookingId=' + ${booking.id}}" class="btn-action bg-green-600 text-white hover:opacity-90">
                                <i class="fas fa-credit-card mr-1"></i> MAKE PAYMENT
                            </a>
                        </th:block>

                        <!-- Delete Button: All statuses -->
                        <button type="button" class="btn-action bg-red-600 text-white hover:opacity-90 delete-btn"
                                th:data-booking-id="${booking.id}"
                                th:data-has-payment="${@bookingService.hasPayment(booking.id)}"
                                onclick="showDeleteConfirmation(this)">
                            <i class="fas fa-trash mr-1"></i> DELETE
                        </button>
                    </div>

                    <!-- Legacy delete icon for other roles -->
                    <th:block th:if="${session.loggedUser.role != 'STUDENT'}">
                        <a th:href="@{'/bookings/delete/' + ${booking.id}}"
                           onclick="return confirm('Abort this scheduled unit?')"
                           class="p-2 text-gray-300 hover:text-red-500 transition-colors">✕</a>
                    </th:block>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    function showDeleteConfirmation(button) {
        const bookingId = button.getAttribute('data-booking-id');
        const hasPayment = button.getAttribute('data-has-payment') === 'true';

        let message = 'Are you sure you want to delete this booking?';
        if (hasPayment) {
            message = 'Are you sure? This will not refund the payment. Delete this booking?';
        }

        if (confirm(message)) {
            window.location.href = '/bookings/delete/' + bookingId;
        }
    }
</script>
</body>
</html>
