<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Booking - TutorSync</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card-container { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .input-field { width: 100%; padding: 12px 16px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .input-field:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .btn-primary { background: #667eea; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #e2e8f0; color: #334155; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
        .btn-secondary:hover { background: #cbd5e1; }
        .label { display: block; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-group { margin-bottom: 20px; }
        .alert { background: #fef3c7; border: 2px solid #fcd34d; color: #92400e; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
<!-- Navigation Header -->
<header style="background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div style="display: flex; align-items: center; gap: 12px;">
        <div style="width: 32px; height: 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;">S</div>
        <a th:href="@{/dashboard}" style="font-weight: bold; font-size: 16px; color: #667eea; text-decoration: none;">TutorSync</a>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <a th:href="@{/bookings/list}" style="font-size: 12px; font-weight: bold; color: #64748b; text-decoration: none; text-transform: uppercase;">My Bookings</a>
        <a th:href="@{/bookings/list}" style="font-size: 12px; font-weight: bold; color: #667eea; text-decoration: none; text-transform: uppercase;">← Back to Bookings</a>
    </div>
</header>

<div class="flex items-center justify-center py-10">
    <div class="w-full max-w-md px-6">
        <div class="card-container">
            <div class="flex items-center gap-3 mb-8">
                <i class="fas fa-edit text-2xl text-blue-600"></i>
                <h1 class="text-2xl font-bold text-gray-800">Edit Booking</h1>
            </div>

            <div class="alert">
                <i class="fas fa-info-circle mr-2"></i>
                <strong>Note:</strong> You can only edit bookings more than 24 hours away
            </div>

            <form th:action="@{'/bookings/update/' + ${booking.id}}" method="POST" class="space-y-6">
                <div class="form-group">
                    <label class="label">Subject</label>
                    <input type="text" name="subject" th:value="${booking.subject}" required class="input-field">
                </div>

                <div class="form-group">
                    <label class="label">Date</label>
                    <input type="date" name="date" th:value="${booking.dateTime.split(' ')[0]}" required class="input-field">
                </div>

                <div class="form-group">
                    <label class="label">Time</label>
                    <input type="time" name="time" th:value="${booking.dateTime.split(' ')[1]}" required class="input-field">
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 btn-primary">
                        <i class="fas fa-save mr-2"></i> Update Booking
                    </button>
                    <a th:href="@{/bookings/list}" class="flex-1 btn-secondary text-center">
                        <i class="fas fa-times mr-2"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
